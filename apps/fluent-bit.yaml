apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # after operators are up
spec:
  project: default
  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit
    targetRevision: "*"
    helm:
      releaseName: fluent-bit
      values: |
        # Run as DaemonSet (default) to collect logs from every node
        kind: DaemonSet

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        # ── Pipeline config ────────────────────────────────────────
        config:
          # Tail all container logs from the host
          inputs: |
            [INPUT]
                Name              tail
                Path              /var/log/containers/*.log
                multiline.parser  docker, cri
                Tag               kube.*
                Mem_Buf_Limit     5MB
                Skip_Long_Lines   On

          # Enrich with Kubernetes metadata
          filters: |
            [FILTER]
                Name                kubernetes
                Match               kube.*
                Kube_URL            https://kubernetes.default.svc:443
                Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
                Kube_Tag_Prefix     kube.var.log.containers.
                Merge_Log           On
                Keep_Log            Off
                K8S-Logging.Parser  On
                K8S-Logging.Exclude Off

          # ── Output: stdout (good for testing) ────────────────────
          # Switch to Elasticsearch, Loki, S3, etc. for real use.
          outputs: |
            [OUTPUT]
                Name   stdout
                Match  *
                Format json_lines

          # ── Example: forward to Loki (uncomment to enable) ───────
          # outputs: |
          #   [OUTPUT]
          #       Name            loki
          #       Match           *
          #       Host            loki.monitoring.svc.cluster.local
          #       Port            3100
          #       Labels          job=fluent-bit
          #       Label_Keys      $kubernetes['namespace_name'],$kubernetes['pod_name']
          #       Auto_Kubernetes_Labels On

        # Allow reading host log files
        daemonSetVolumes:
          - name: varlog
            hostPath:
              path: /var/log
          - name: varlibdockercontainers
            hostPath:
              path: /var/lib/docker/containers

        daemonSetVolumeMounts:
          - name: varlog
            mountPath: /var/log
          - name: varlibdockercontainers
            mountPath: /var/lib/docker/containers
            readOnly: true

  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
