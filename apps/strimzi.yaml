# ──────────────────────────────────────────────────────────────────
# Strimzi — Operator + a basic Kafka Cluster CR
# Same wave-split pattern as CNPG: operator first, cluster CR second.
# ──────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://strimzi.io/charts/
    chart: strimzi-kafka-operator
    targetRevision: "*"
    helm:
      releaseName: strimzi
      values: |
        watchNamespaces:
          - kafka
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 512Mi
        logLevel: INFO
  destination:
    server: https://kubernetes.default.svc
    namespace: strimzi-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # required for Strimzi CRDs

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/Arv2565/vcluster-argocd-apps.git
    targetRevision: main
    path: infra/strimzi-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
