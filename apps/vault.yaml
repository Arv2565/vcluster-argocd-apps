apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: "*"          # pin to e.g. "0.28.1" for prod
    helm:
      releaseName: vault
      values: |
        global:
          enabled: true

        server:
          # Dev mode: single pod, in-memory storage, auto-unsealed.
          # !! Not for production — switch to ha + integrated/raft storage !!
          dev:
            enabled: true
            devRootToken: "root"   # change or remove for non-dev use

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          # For production, replace dev block with:
          # standalone:
          #   enabled: true
          #   config: |
          #     storage "raft" { path = "/vault/data" }
          #     listener "tcp" { address = "[::]:8200" tls_disable = 1 }
          #     api_addr = "http://vault.vault.svc.cluster.local:8200"

        ui:
          enabled: true
          serviceType: ClusterIP

        injector:
          enabled: true   # Vault Agent Injector for sidecar secret injection

  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
