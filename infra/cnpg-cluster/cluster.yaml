
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-cluster
  namespace: postgres
spec:
  instances: 1          # bump to 3 for HA

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"

  bootstrap:
    initdb:
      database: appdb
      owner: appuser
      secret:
        name: postgres-app-secret   # create this Secret separately (see note)

  storage:
    size: 5Gi
    # storageClass: standard       # uncomment and set if needed

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
